<svg width="460" height="130" viewBox="0 0 460 130" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Orange gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#FF5A00"/>
    </linearGradient>
  </defs>

  <!-- Icon circle (leggermente più chiaro) -->
  <circle cx="65" cy="65" r="45" fill="#1A1A1A"/>

  <!-- Barbell -->
  <rect x="42" y="63" width="46" height="4" rx="2" fill="url(#orangeGrad)"/>

  <!-- Left plates -->
  <rect x="36" y="55" width="5" height="20" rx="1" fill="url(#orangeGrad)"/>
  <rect x="31" y="58" width="5" height="14" rx="1" fill="url(#orangeGrad)"/>

  <!-- Right plates -->
  <rect x="89" y="55" width="5" height="20" rx="1" fill="url(#orangeGrad)"/>
  <rect x="94" y="58" width="5" height="14" rx="1" fill="url(#orangeGrad)"/>

  <!-- Brand name -->
  <text x="130" y="75"
        font-family="Poppins, Montserrat, Arial, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#FFFFFF">
        Bool<tspan fill="#FF6A00">Shop</tspan>
  </text>

  <!-- Tagline -->
  <text x="132" y="100"
        font-family="Poppins, Arial, sans-serif"
        font-size="12"
        letter-spacing="3"
        fill="#BBBBBB">
        HOME GYM EQUIPMENT
  </text>

</svg>